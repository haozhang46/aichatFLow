openapi: 3.1.0
info:
  title: Unified FastGPT-Dify API
  version: 0.1.0
  description: Contract for plan-first unified chat/workflow access and stream execution.
servers:
  - url: https://api.example.com
paths:
  /v1/otie/intent:
    post:
      summary: Normalize a request into an OTIE intent envelope
      operationId: createOtieIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtieRequestInput'
      responses:
        '200':
          description: Normalized intent
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  intent:
                    $ref: '#/components/schemas/IntentEnvelope'
  /v1/otie/plan:
    post:
      summary: Build an executable OTIE plan from a request or intent
      operationId: createOtiePlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtiePlanRequest'
      responses:
        '200':
          description: OTIE plan response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  intent:
                    $ref: '#/components/schemas/IntentEnvelope'
                  executionPlan:
                    $ref: '#/components/schemas/ExecutionPlan'
  /v1/otie/run:
    post:
      summary: Execute an OTIE plan and persist a replayable run trace
      operationId: runOtiePlan
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtieRunRequest'
      responses:
        '200':
          description: OTIE run result
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  run:
                    $ref: '#/components/schemas/OtieRunResult'
  /v1/otie/runs/{runId}:
    get:
      summary: Fetch a replayable OTIE run by id
      operationId: getOtieRun
      parameters:
        - in: path
          name: runId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OTIE run details
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  run:
                    $ref: '#/components/schemas/OtieRunResult'
  /v1/otie/tools:
    get:
      summary: List registered OTIE tools
      operationId: listOtieTools
      responses:
        '200':
          description: OTIE tool catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/CapabilityTool'
  /v1/unified/plan:
    post:
      summary: Generate editable plan and capability recommendations for chat
      operationId: planUnifiedRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedRequest'
      responses:
        '200':
          description: Plan response with recommendation metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/unified/execute:
    post:
      summary: Execute a unified chat or workflow request
      operationId: executeUnifiedRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedRequest'
      responses:
        '200':
          description: Unified response envelope
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnifiedResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/unified/execute/stream:
    post:
      summary: Execute a confirmed chat plan and stream execution events
      operationId: executeUnifiedStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnifiedRequest'
      responses:
        '200':
          description: SSE stream of execution events
          content:
            text/event-stream:
              schema:
                type: string
        '400':
          description: Invalid request or missing confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: Upstream provider error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/routes:
    get:
      summary: List integration routes
      operationId: listRoutes
      responses:
        '200':
          description: Active route list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IntegrationRoute'
components:
  schemas:
    UnifiedRequest:
      type: object
      required:
        - requestId
        - tenantId
        - requestType
      properties:
        requestId:
          type: string
        tenantId:
          type: string
        requestType:
          type: string
          enum: [chat, workflow]
        messages:
          type: array
          items:
            type: object
            additionalProperties: true
        workflowId:
          type: string
        inputs:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    UnifiedResponse:
      type: object
      required:
        - requestId
        - provider
        - status
        - latencyMs
        - traceId
        - fallbackUsed
        - timestamp
      properties:
        requestId:
          type: string
        provider:
          type: string
          enum: [fastgpt, dify, langchain]
        status:
          type: string
          enum: [success, partial, failed]
        output:
          type: object
          additionalProperties: true
          properties:
            mode:
              type: string
              enum: [agent, react, workflow]
            phase:
              type: string
              enum: [plan, execute]
            plan:
              type: array
              items:
                type: string
            recommendedAgent:
              type: string
            recommendedSkills:
              type: array
              items:
                type: string
            missingSkills:
              type: array
              items:
                type: string
            installRequired:
              type: boolean
        error:
          type: object
          additionalProperties: true
        latencyMs:
          type: number
        traceId:
          type: string
        fallbackUsed:
          type: boolean
        timestamp:
          type: string
          format: date-time
    IntegrationRoute:
      type: object
      required:
        - id
        - tenantId
        - requestType
        - primaryProvider
        - fallbackProvider
        - timeoutMs
        - enabled
      properties:
        id:
          type: string
        tenantId:
          type: string
        requestType:
          type: string
          enum: [chat, workflow]
        matchTags:
          type: array
          items:
            type: string
        primaryProvider:
          type: string
          enum: [fastgpt, dify]
        fallbackProvider:
          type: string
          enum: [fastgpt, dify, none]
        timeoutMs:
          type: integer
          minimum: 1000
          maximum: 15000
        enabled:
          type: boolean
    CapabilityTool:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        builtin:
          type: boolean
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
    OtieRequestInput:
      type: object
      properties:
        requestId:
          type: string
        tenantId:
          type: string
        requestType:
          type: string
          enum: [chat, workflow]
        messages:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              content:
                type: string
        inputs:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
    IntentEnvelope:
      type: object
      properties:
        intentId:
          type: string
        requestId:
          type: string
        tenantId:
          type: string
        sourceRequestType:
          type: string
        userQuery:
          type: string
        modeHint:
          type: string
          enum: [auto, agent, react, workflow]
        executionMode:
          type: string
          enum: [auto_exec, user_exec]
        llmConfig:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        constraints:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
    RetryPolicy:
      type: object
      properties:
        maxRetries:
          type: integer
        backoffMs:
          type: integer
    PlanStep:
      type: object
      properties:
        stepId:
          type: string
        kind:
          type: string
          enum: [reason, tool, respond]
        action:
          type: string
        dependsOn:
          type: array
          items:
            type: string
        agent:
          type: string
          enum: [auto, agent, react, workflow]
        toolId:
          type: string
        toolArgs:
          type: object
          additionalProperties: true
        retryPolicy:
          $ref: '#/components/schemas/RetryPolicy'
        timeoutMs:
          type: integer
        outputSchema:
          type: object
          additionalProperties: true
    ExecutionPlan:
      type: object
      properties:
        planId:
          type: string
        intentId:
          type: string
        mode:
          type: string
          enum: [agent, react, workflow]
        status:
          type: string
          enum: [draft, ready, running, completed, failed, blocked]
        maxSteps:
          type: integer
        steps:
          type: array
          items:
            $ref: '#/components/schemas/PlanStep'
        createdAt:
          type: string
          format: date-time
    OtiePlanRequest:
      type: object
      properties:
        request:
          $ref: '#/components/schemas/OtieRequestInput'
        intent:
          $ref: '#/components/schemas/IntentEnvelope'
    OtieRunRequest:
      type: object
      properties:
        request:
          $ref: '#/components/schemas/OtieRequestInput'
        intent:
          $ref: '#/components/schemas/IntentEnvelope'
        plan:
          $ref: '#/components/schemas/ExecutionPlan'
        stepApprovals:
          type: object
          additionalProperties:
            type: boolean
    OtieRunResult:
      type: object
      properties:
        runId:
          type: string
        status:
          type: string
        traceId:
          type: string
        intent:
          $ref: '#/components/schemas/IntentEnvelope'
        plan:
          $ref: '#/components/schemas/ExecutionPlan'
        finalAnswer:
          type: string
        stepOutputs:
          type: object
          additionalProperties: true
        events:
          type: array
          items:
            type: object
            additionalProperties: true
